name: Release Obsidian Gemini plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only test job — nothing here pushes with the git-config
          # credential, so don't persist the checkout token for the rest of the job.
          persist-credentials: false
      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # No npm cache on purpose. This is the release workflow that publishes
          # the plugin build and its provenance attestation, so a poisoned or
          # restored npm cache is a supply-chain risk that outweighs the
          # install-time saving. Keep caching off on setup-node throughout
          # release.yml — don't add a `cache:` key here without revisiting that.
          node-version: '24.x'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The release step authenticates `gh release create` with its own
          # GITHUB_TOKEN env, and attest-build-provenance uses the OIDC id-token —
          # neither relies on the git-config credential, and nothing here runs
          # `git push`, so don't persist the checkout token.
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # No npm cache on purpose. This job publishes the plugin build and its
          # provenance attestation, so a poisoned or restored npm cache is a
          # supply-chain risk that outweighs the install-time saving. Keep
          # caching off on setup-node throughout release.yml — don't add a
          # `cache:` key here without revisiting that.
          node-version: '24.x'

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
