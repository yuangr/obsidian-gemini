name: Knip

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  knip:
    name: Dead-code & unused-deps report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only report job — nothing here pushes with the git-config
          # credential, so don't persist the checkout token for the rest of the job.
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Non-blocking: surfaces a report without failing the PR while the allowlist
      # settles. Drop `continue-on-error: true` in a follow-up to make it blocking.
      - name: Run knip
        run: npm run knip
        continue-on-error: true
