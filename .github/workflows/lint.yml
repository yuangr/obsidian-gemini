name: Lint & Format

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only lint job — nothing here pushes with the git-config
          # credential, so don't persist the checkout token for the rest of the job.
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check GitHub Actions are SHA-pinned
        run: npm run lint:actions

      - name: Check formatting with Prettier
        run: npm run format-check

      - name: TypeScript type check
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript type check (tests)
        run: npm run typecheck:test

      - name: Run ESLint
        run: npm run lint

      - name: Check for circular imports
        run: npm run lint:cycles
