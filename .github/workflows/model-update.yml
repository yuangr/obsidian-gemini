name: Check for new Gemini models

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly on Monday at 8 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  check-models:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # create-pull-request authenticates with its own token, so the checkout
          # token does not need to persist in git config where npm ci / the model
          # script could read it (mirrors i18n-translate.yml).
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'

      - name: Check for new models
        id: update
        continue-on-error: true
        run: node scripts/update-models.mjs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Install dependencies
        if: steps.update.outcome == 'success'
        run: npm ci

      - name: Format models.json
        if: steps.update.outcome == 'success'
        run: npm run format

      - name: Create PR if models changed
        if: steps.update.outcome == 'success'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore: update models.json with new Gemini models'
          title: 'chore: Update available Gemini models'
          body: |
            Automated model list update. New models detected from Google's API.

            **Please review and curate before merging:**
            - Verify model labels are correct
            - Assign `defaultForRoles` if a new model should be a default
            - Remove models that shouldn't be offered to users
            - Check `supportsImageGeneration` flags
          branch: auto/model-update
          labels: models,automated
          delete-branch: true
